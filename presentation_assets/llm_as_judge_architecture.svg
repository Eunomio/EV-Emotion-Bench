<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg{fill:#f8fbff}.title{font:700 34px "Microsoft YaHei",Arial;fill:#102a56}.h{font:700 24px "Microsoft YaHei",Arial;fill:#123}.t{font:18px "Microsoft YaHei",Arial;fill:#26364d}.s{font:16px "Microsoft YaHei",Arial;fill:#506070}.tiny{font:14px "Microsoft YaHei",Arial;fill:#5f6f86}
      .box{fill:white;stroke:#b8c9e8;stroke-width:2;rx:18}.blue{stroke:#5c8df6}.green{stroke:#49a67a}.orange{stroke:#ff8a3d}.purple{stroke:#8c72d9}
      .chip{fill:#eef4ff;stroke:#b8c9e8;rx:12}.chipg{fill:#eefaf4;stroke:#a7d6bf;rx:12}.chipo{fill:#fff3ea;stroke:#ffc49d;rx:12}.chipp{fill:#f5f1ff;stroke:#c9bcf0;rx:12}
      .good{fill:#ecfdf3;stroke:#8fd3aa;rx:14}.bad{fill:#fff1f1;stroke:#f4a1a1;rx:14}.neutral{fill:#f8fbff;stroke:#c7d5ea;rx:14}
      .arrow{stroke:#5c6f91;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5c6f91"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text x="64" y="64" class="title">NOMI多轮Bench：LLM-as-Judge验证架构</text>
  <text x="64" y="98" class="s">目标：在多轮对话轨迹中验证评分框架能否识别上下文承接、节奏控制与用户状态扭转。</text>

  <rect x="50" y="135" width="335" height="560" class="box blue"/>
  <text x="80" y="180" class="h">① 评分框架构建</text>
  <rect x="78" y="205" width="280" height="86" class="chip"/>
  <text x="96" y="232" class="t">安全伦理（门控）</text>
  <text x="100" y="258" class="tiny">人身安全 / 隐私边界 / 自主性</text>
  <rect x="78" y="310" width="280" height="170" class="chip"/>
  <text x="96" y="337" class="t">单轮 / 动态评分</text>
  <text x="100" y="363" class="tiny">内容：相关性、场景、长度、密度</text>
  <text x="100" y="389" class="tiny">情绪：识别、强度、声学、一致性</text>
  <text x="100" y="415" class="tiny">技巧：心理技术、节奏控制</text>
  <text x="100" y="441" class="tiny">人格：拟人化、人格匹配、一致性</text>
  <rect x="78" y="500" width="280" height="128" class="chip"/>
  <text x="96" y="527" class="t">用户状态扭转</text>
  <text x="100" y="553" class="tiny">认知开放 / 情绪适应 / 关系联结</text>
  <text x="100" y="579" class="tiny">依据用户下一轮反馈判断变化</text>
  <text x="80" y="665" class="s">输出：完整维度树与评分标准</text>

  <rect x="445" y="135" width="335" height="560" class="box green"/>
  <text x="475" y="180" class="h">② 多轮Bench样本构造</text>
  <rect x="475" y="210" width="275" height="78" class="chipg"/>
  <text x="493" y="238" class="t">场景初始化</text>
  <text x="498" y="264" class="tiny">风险等级 / 驾驶负荷 / 初始状态</text>
  <rect x="475" y="310" width="275" height="112" class="chipg"/>
  <text x="493" y="338" class="t">多轮对话历史</text>
  <text x="498" y="365" class="tiny">U1：刚下班，脑子转不动</text>
  <text x="498" y="390" class="tiny">R1：今天消耗挺大的</text>
  <text x="498" y="415" class="tiny">U2：一句话都不想多说</text>
  <rect x="475" y="445" width="275" height="96" class="chipg"/>
  <text x="493" y="473" class="t">三类候选R2</text>
  <text x="498" y="500" class="tiny">模型生成 / 人工高分 / 人工低分</text>
  <rect x="475" y="560" width="275" height="78" class="chipg"/>
  <text x="493" y="588" class="t">用户下一轮反应</text>
  <text x="498" y="615" class="tiny">作为状态扭转证据</text>

  <path d="M390 415 C410 415 420 415 440 415" class="arrow"/>

  <rect x="840" y="135" width="335" height="560" class="box orange"/>
  <text x="870" y="180" class="h">③ LLM-as-Judge评估</text>
  <rect x="870" y="210" width="275" height="82" class="chipo"/>
  <text x="888" y="238" class="t">Judge输入</text>
  <text x="893" y="264" class="tiny">初始化 + 多轮历史 + R2 + 用户反馈</text>
  <rect x="870" y="315" width="275" height="136" class="chipo"/>
  <text x="888" y="343" class="t">多层维度评分</text>
  <text x="893" y="370" class="tiny">安全门控、单轮质量</text>
  <text x="893" y="396" class="tiny">多轮轨迹、用户状态扭转</text>
  <text x="893" y="422" class="tiny">逐项给分 + 理由</text>
  <rect x="870" y="475" width="275" height="96" class="chipo"/>
  <text x="888" y="503" class="t">输出结果</text>
  <text x="893" y="530" class="tiny">维度分 / 错误标签 / 最终分</text>
  <rect x="870" y="595" width="275" height="64" class="chipo"/>
  <text x="888" y="623" class="t">验证结论</text>
  <text x="893" y="650" class="tiny">能否识别低负荷陪伴是否有效</text>

  <path d="M785 415 C805 415 815 415 835 415" class="arrow"/>

  <rect x="1235" y="135" width="315" height="560" class="box purple"/>
  <text x="1265" y="180" class="h">④ 后续展望</text>
  <rect x="1265" y="212" width="250" height="88" class="chipp"/>
  <text x="1283" y="240" class="t">扩展样本规模</text>
  <text x="1288" y="267" class="tiny">更多场景、更多模型、人工复核</text>
  <rect x="1265" y="320" width="250" height="88" class="chipp"/>
  <text x="1283" y="348" class="t">偏好数据沉淀</text>
  <text x="1288" y="375" class="tiny">chosen / rejected，错误类型库</text>
  <rect x="1265" y="428" width="250" height="88" class="chipp"/>
  <text x="1283" y="456" class="t">Reward / Judge模型</text>
  <text x="1288" y="483" class="tiny">SFT / DPO / RM，一致性校准</text>
  <rect x="1265" y="536" width="250" height="88" class="chipp"/>
  <text x="1283" y="564" class="t">真实车载评估</text>
  <text x="1288" y="591" class="tiny">日志回流、用户反馈、安全监控</text>

  <path d="M1180 415 C1200 415 1210 415 1230 415" class="arrow"/>

  <rect x="60" y="725" width="1480" height="130" class="neutral"/>
  <text x="90" y="760" class="h">示例：下班疲惫场景多轮验证</text>
  <text x="95" y="793" class="s">多轮历史：U1“刚下班，脑子转不动。” → R1“今天消耗挺大的。” → U2“一句话都不想多说。”</text>
  <rect x="95" y="810" width="670" height="34" class="good"/>
  <text x="112" y="833" class="s">高分R2：好，那我少说点，给你放点轻一点的音乐。 → 用户：嗯，放点轻的吧。</text>
  <rect x="805" y="810" width="670" height="34" class="bad"/>
  <text x="822" y="833" class="s">低分R2：我们从认知负荷和职业倦怠详细分析。 → 用户：别分析了，我更累。</text>
  <text x="95" y="875" class="s">Judge对比：高分=低负荷陪伴、节奏收束、状态稳定；低分=高认知负荷、忽视拒绝信号、状态恶化。</text>
</svg>
